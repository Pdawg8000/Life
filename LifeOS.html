  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:#0a0a0f;overflow-x:hidden}
    #root{height:100%}
    body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
    ::-webkit-scrollbar{display:none}
    button{-webkit-user-select:none;user-select:none}
    #loading{position:fixed;inset:0;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s}
    #loading .logo{font-size:52px;margin-bottom:16px;animation:pls 2s infinite}
    #loading .name{font-family:-apple-system,sans-serif;color:#818cf8;font-size:30px;font-weight:700;letter-spacing:3px}
    #loading .sub{font-family:-apple-system,sans-serif;color:rgba(255,255,255,0.3);font-size:13px;margin-top:8px}
    #loading .bar-wrap{width:160px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:32px;overflow:hidden}
    #loading .bar{height:100%;width:0%;background:linear-gradient(90deg,#6366f1,#818cf8);border-radius:2px;animation:lb 1.8s ease forwards}
    @keyframes pls{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
    @keyframes lb{0%{width:0%}60%{width:65%}100%{width:100%}}
    #ios-banner{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:rgba(99,102,241,0.97);backdrop-filter:blur(12px);border-radius:16px;padding:12px 16px;display:none;align-items:center;gap:10px;z-index:500;max-width:380px;width:calc(100% - 32px);box-shadow:0 8px 32px rgba(99,102,241,0.5)}
    #ios-banner.show{display:flex}
    #ios-banner .icon{font-size:22px;flex-shrink:0}
    #ios-banner .txt{flex:1;font-family:-apple-system,sans-serif}
    #ios-banner .txt b{color:#fff;font-size:13px;display:block}
    #ios-banner .txt span{color:rgba(255,255,255,0.7);font-size:12px}
    #ios-banner .x{background:none;border:none;color:rgba(255,255,255,0.6);font-size:20px;cursor:pointer;padding:0 2px;flex-shrink:0}
  </style>
</head>

const DAYS   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function fmtTime(d){ if(!d)return""; const h=d.getHours(),m=d.getMinutes(); return `${h%12||12}:${String(m).padStart(2,"0")} ${h<12?"AM":"PM"}`; }

const CLAUDE_SYSTEM = `You are ARIA, an AI life assistant embedded in a personal productivity app called LifeOS. You help with:
- Parsing voice/text input into calendar events and tasks (return JSON when asked)
- Suggesting healthy recipes with macros
- Workout planning and running accountability
- Daily planning and habit tracking
- Answering general questions conversationally

When the user wants to add an event/task, extract: title, date, time, category (work/health/personal/food), and notes.
Return ONLY valid JSON like: {"action":"add_event","title":"...","date":"YYYY-MM-DD","time":"HH:MM","category":"...","notes":"..."}

For recipes return: {"action":"recipe","name":"...","calories":0,"protein":0,"carbs":0,"fat":0,"ingredients":["..."],"steps":["..."]}

For general conversation, respond naturally and helpfully. Keep it concise and friendly.`;

async function callClaude(messages, onChunk){
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1000, system:CLAUDE_SYSTEM, stream:true, messages })
  });
  if(!res.ok) throw new Error("API error");
  const reader=res.body.getReader(), dec=new TextDecoder();
  let full="";
  while(true){
    const{done,value}=await reader.read();
    if(done)break;
    for(const line of dec.decode(value).split("\n")){
      if(line.startsWith("data: ")){
        const d=line.slice(6);
        if(d==="[DONE]")break;
        try{ const j=JSON.parse(d); if(j.type==="content_block_delta"&&j.delta?.text){ full+=j.delta.text; onChunk&&onChunk(full); } }catch{}
      }
    }
  }
  return full;
}

function useLocalStorage(key,init){
  const [val,setVal]=useState(()=>{ try{ const s=localStorage.getItem(key); return s?JSON.parse(s):init; }catch{ return init; }});
  useEffect(()=>{ try{ localStorage.setItem(key,JSON.stringify(val)); }catch{} },[key,val]);
  return[val,setVal];
}

}

// ── Home Tab ──────────────────────────────────────────────────────────────────
function HomeTab({events,tasks,habits,toggleHabit,toggleTask,setTab,setSelectedDay,userName}){

  return(

        <h1 style={{margin:"0 0 28px",fontSize:28,fontWeight:700,background:`linear-gradient(135deg,${t.text},${t.primary})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{greet}{userName?`, ${userName}`:""}</h1>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:24}}>

            <div key={s.label} style={{background:"rgba(128,128,128,0.06)",borderRadius:16,padding:"14px 12px",border:"1px solid rgba(128,128,128,0.1)"}}>

              return(
                <button key={h.id} onClick={()=>toggleHabit(h.id)} style={{background:done?`${t.primary}18`:"rgba(128,128,128,0.05)",border:`1px solid ${done?`${t.primary}55`:"rgba(128,128,128,0.1)"}`,borderRadius:14,padding:"12px",cursor:"pointer",textAlign:"left",transition:"all 0.2s"}}>
                  <div style={{fontSize:22}}>{h.icon}</div>

// ── Calendar Tab ──────────────────────────────────────────────────────────────
function CalendarTab({events,selectedDay,setSelectedDay,addEvent,showAdd,setShowAdd}){
  const t=useTheme();
  const [viewMonth,setViewMonth]=useState(new Date(selectedDay));
  const [newEv,setNewEv]=useState({title:"",time:"09:00",category:"personal",notes:""});
  const firstDay=new Date(viewMonth.getFullYear(),viewMonth.getMonth(),1);
  const daysInMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDay.getDay();i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(new Date(viewMonth.getFullYear(),viewMonth.getMonth(),d));
  const dayEvents=events.filter(e=>sameDay(new Date(e.datetime),selectedDay)).sort((a,b)=>new Date(a.datetime)-new Date(b.datetime));
  const catColors={work:t.primary,health:"#34d399",personal:t.accent,food:"#fbbf24"};
  function submitEvent(){
    if(!newEv.title.trim())return;
    const[h,m]=newEv.time.split(":").map(Number);
    const dt=new Date(selectedDay); dt.setHours(h,m,0,0);
    addEvent({title:newEv.title,datetime:dt.toISOString(),category:newEv.category,notes:newEv.notes});
    setNewEv({title:"",time:"09:00",category:"personal",notes:""});
    setShowAdd(false);
  }
  return(
    <div style={{padding:"60px 20px 20px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <h2 style={{margin:0,fontSize:24,fontWeight:700,color:t.text}}>{MONTHS[viewMonth.getMonth()]} {viewMonth.getFullYear()}</h2>
        <div style={{display:"flex",gap:8}}>
          {["‹","›"].map((ch,i)=>(
            <button key={i} onClick={()=>setViewMonth(m=>{const n=new Date(m);n.setMonth(n.getMonth()+(i?1:-1));return n;})} style={{background:"rgba(128,128,128,0.1)",border:"none",color:t.text,borderRadius:10,width:32,height:32,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{ch}</button>
          ))}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:8}}>
        {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:11,color:"rgba(128,128,128,0.4)",fontWeight:600,padding:"4px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:24}}>
        {cells.map((d,i)=>{
          if(!d)return<div key={i}/>;
          const isToday=sameDay(d,today),isSel=sameDay(d,selectedDay);
          const hasEv=events.some(e=>sameDay(new Date(e.datetime),d));
          return(
            <button key={i} onClick={()=>setSelectedDay(d)} style={{background:isSel?t.primary:isToday?`${t.primary}33`:"transparent",border:"none",borderRadius:10,padding:"8px 4px",cursor:"pointer",color:isSel?"#fff":isToday?t.primary:t.text,fontWeight:isSel||isToday?700:400,fontSize:14,display:"flex",flexDirection:"column",alignItems:"center",gap:3,transition:"all 0.15s"}}>
              {d.getDate()}
              {hasEv&&<div style={{width:4,height:4,borderRadius:"50%",background:isSel?"rgba(255,255,255,0.8)":t.primary}}/>}
            </button>
          );
        })}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h3 style={{margin:0,fontSize:16,fontWeight:600,color:t.text}}>{sameDay(selectedDay,today)?"Today":selectedDay.toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})}</h3>
        <button onClick={()=>setShowAdd(true)} style={{background:t.grad,border:"none",color:"#fff",borderRadius:20,padding:"6px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Add</button>
      </div>
      {dayEvents.length===0?<Empty text="No events. Tap + Add to create one."/>:dayEvents.map(ev=>(
        <div key={ev.id} style={{display:"flex",gap:12,padding:"12px 14px",background:"rgba(128,128,128,0.06)",borderRadius:14,marginBottom:8,borderLeft:`3px solid ${catColors[ev.category]||t.primary}`}}>
          <div>
            <div style={{fontSize:12,color:catColors[ev.category]||t.primary,fontWeight:600,textTransform:"uppercase"}}>{fmtTime(new Date(ev.datetime))}</div>
            <div style={{fontSize:15,fontWeight:600,marginTop:2,color:t.text}}>{ev.title}</div>
            {ev.notes&&<div style={{fontSize:12,color:"rgba(128,128,128,0.5)",marginTop:3}}>{ev.notes}</div>}
          </div>
        </div>
      ))}
      {showAdd&&(
        <Modal onClose={()=>setShowAdd(false)} title="New Event">
          <Input placeholder="Event title" value={newEv.title} onChange={v=>setNewEv(p=>({...p,title:v}))} autoFocus={true}/>
          <Input type="time" value={newEv.time} onChange={v=>setNewEv(p=>({...p,time:v}))}/>
          <Select value={newEv.category} onChange={v=>setNewEv(p=>({...p,category:v}))} options={[["personal","👤 Personal"],["work","💼 Work"],["health","💪 Health"],["food","🍎 Food"]]}/>
          <Input placeholder="Notes (optional)" value={newEv.notes} onChange={v=>setNewEv(p=>({...p,notes:v}))}/>
          <Btn onClick={submitEvent}>Add Event</Btn>
        </Modal>
      )}
    </div>
  );
}

// ── Tasks Tab ─────────────────────────────────────────────────────────────────
function TasksTab({tasks,addTask,toggleTask}){
  const t=useTheme();
  const [showAdd,setShowAdd]=useState(false);
  const [newTask,setNewTask]=useState({title:"",due:"",priority:"medium",category:"personal"});
  const [filter,setFilter]=useState("all");
  const filtered=tasks.filter(tk=>filter==="all"||tk.category===filter);
  const prioColor={high:"#f87171",medium:"#fbbf24",low:"#34d399"};
  function submit(){ if(!newTask.title.trim())return; addTask(newTask); setNewTask({title:"",due:"",priority:"medium",category:"personal"}); setShowAdd(false); }
  return(
    <div style={{padding:"60px 20px 20px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{margin:0,fontSize:24,fontWeight:700,color:t.text}}>Tasks</h2>
        <button onClick={()=>setShowAdd(true)} style={{background:t.grad,border:"none",color:"#fff",borderRadius:20,padding:"6px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Add</button>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:20,overflowX:"auto",paddingBottom:4}}>
        {["all","work","personal","health","food"].map(c=>(
          <button key={c} onClick={()=>setFilter(c)} style={{background:filter===c?t.primary:"rgba(128,128,128,0.1)",border:"none",color:filter===c?"#fff":"rgba(128,128,128,0.6)",borderRadius:20,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.2s",textTransform:"capitalize"}}>{c}</button>
        ))}
      </div>
      {filtered.filter(tk=>!tk.done).length===0&&filtered.filter(tk=>tk.done).length===0&&<Empty text="No tasks yet. Add your first task!"/>}
      {filtered.filter(tk=>!tk.done).map(tk=>(
        <div key={tk.id} onClick={()=>toggleTask(tk.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:"rgba(128,128,128,0.05)",borderRadius:14,marginBottom:8,cursor:"pointer"}}>
          <div style={{width:22,height:22,borderRadius:"50%",border:`2px solid rgba(128,128,128,0.3)`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,color:t.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{tk.title}</div>
            {tk.due&&<div style={{fontSize:11,color:"rgba(128,128,128,0.5)",marginTop:2}}>{tk.due}</div>}
          </div>
          <div style={{fontSize:10,color:prioColor[tk.priority],padding:"2px 8px",borderRadius:20,fontWeight:600,textTransform:"uppercase",background:`${prioColor[tk.priority]}22`,flexShrink:0}}>{tk.priority}</div>
        </div>
      ))}
      {filtered.filter(tk=>tk.done).length>0&&(
        <>
          <div style={{fontSize:12,color:"rgba(128,128,128,0.4)",marginTop:16,marginBottom:10,fontWeight:600,letterSpacing:"1px",textTransform:"uppercase"}}>Completed</div>
          {filtered.filter(tk=>tk.done).map(tk=>(
            <div key={tk.id} onClick={()=>toggleTask(tk.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:"rgba(128,128,128,0.04)",borderRadius:14,marginBottom:8,cursor:"pointer",opacity:0.5}}>
              <div style={{width:22,height:22,borderRadius:"50%",border:`2px solid #34d399`,background:"rgba(52,211,153,0.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:12,color:"#34d399"}}>✓</span></div>
              <div style={{fontSize:14,color:t.text,textDecoration:"line-through"}}>{tk.title}</div>
            </div>
          ))}
        </>
      )}
      {showAdd&&(
        <Modal onClose={()=>setShowAdd(false)} title="New Task">
          <Input placeholder="Task title" value={newTask.title} onChange={v=>setNewTask(p=>({...p,title:v}))} autoFocus={true}/>
          <Input placeholder="Due date (e.g. tomorrow, Monday)" value={newTask.due} onChange={v=>setNewTask(p=>({...p,due:v}))}/>
          <Select value={newTask.priority} onChange={v=>setNewTask(p=>({...p,priority:v}))} options={[["high","🔴 High"],["medium","🟡 Medium"],["low","🟢 Low"]]}/>
          <Select value={newTask.category} onChange={v=>setNewTask(p=>({...p,category:v}))} options={[["personal","👤 Personal"],["work","💼 Work"],["health","💪 Health"],["food","🍎 Food"]]}/>
          <Btn onClick={submit}>Add Task</Btn>
        </Modal>
      )}
    </div>
  );
}

// ── Health Tab ────────────────────────────────────────────────────────────────
function HealthTab({habits,toggleHabit,savedRecipes,setSavedRecipes}){
  const t=useTheme();
  const [subTab,setSubTab]=useState("habits");
  const [showRecipeModal,setShowRecipeModal]=useState(false);
  const [recipeQuery,setRecipeQuery]=useState("");
  const [loadingRecipe,setLoadingRecipe]=useState(false);
  const [currentRecipe,setCurrentRecipe]=useState(null);
  const todayStr=new Date().toDateString();

  async function fetchRecipe(){
    if(!recipeQuery.trim())return;
    setLoadingRecipe(true);
    try{
      let full="";
      await callClaude([{role:"user",content:`Give me a healthy recipe for: ${recipeQuery}. Return ONLY the JSON recipe format specified.`}],tx=>{full=tx;});
      const match=full.match(/\{[\s\S]*\}/);
      if(match){ const r=JSON.parse(match[0]); if(r.action==="recipe") setCurrentRecipe(r); }
    }catch(e){}
    setLoadingRecipe(false);
  }

  return(
    <div style={{padding:"60px 20px 20px"}}>
      <h2 style={{margin:"0 0 20px",fontSize:24,fontWeight:700,color:t.text}}>Health</h2>
      <div style={{display:"flex",gap:8,marginBottom:24,background:"rgba(128,128,128,0.06)",borderRadius:14,padding:4}}>
        {[["habits","Habits"],["nutrition","Nutrition"],["runs","Running"]].map(([id,label])=>(
          <button key={id} onClick={()=>setSubTab(id)} style={{flex:1,background:subTab===id?`${t.primary}33`:"transparent",border:`1px solid ${subTab===id?`${t.primary}66`:"transparent"}`,color:subTab===id?t.primary:"rgba(128,128,128,0.5)",borderRadius:10,padding:"8px 4px",fontSize:13,fontWeight:600,cursor:"pointer",transition:"all 0.2s"}}>{label}</button>
        ))}
      </div>

      {subTab==="habits"&&(
        <>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {habits.map(h=>{
              const done=h.completedDates.includes(todayStr);
              return(
                <button key={h.id} onClick={()=>toggleHabit(h.id)} style={{background:done?`${t.primary}18`:"rgba(128,128,128,0.05)",border:`1px solid ${done?`${t.primary}55`:"rgba(128,128,128,0.1)"}`,borderRadius:16,padding:"16px",cursor:"pointer",textAlign:"left",transition:"all 0.25s"}}>
                  <div style={{fontSize:28,marginBottom:8}}>{h.icon}</div>
                  <div style={{fontSize:13,fontWeight:600,color:done?t.primary:t.text}}>{h.name}</div>
                  <div style={{height:3,background:"rgba(128,128,128,0.1)",borderRadius:2,margin:"8px 0 4px"}}>
                    <div style={{width:done?"100%":"0%",height:"100%",background:t.primary,borderRadius:2,transition:"width 0.4s"}}/>
                  </div>
                  <div style={{fontSize:11,color:"rgba(128,128,128,0.5)"}}>🔥 {h.streak}-day streak</div>
                  {done&&<div style={{fontSize:11,color:t.primary,marginTop:4,fontWeight:600}}>✓ Done today</div>}
                </button>
              );
            })}
          </div>
          <div style={{marginTop:24,background:"rgba(128,128,128,0.05)",borderRadius:16,padding:"16px"}}>
            <div style={{fontSize:12,fontWeight:600,color:"rgba(128,128,128,0.5)",marginBottom:14,textTransform:"uppercase",letterSpacing:"0.5px"}}>This Week</div>
            {habits.map(h=>{
              const days=[...Array(7)].map((_,i)=>{ const d=new Date(); d.setDate(d.getDate()-6+i); return d.toDateString(); });

          </div>
          {savedRecipes.length===0&&<Empty text="Ask ARIA for healthy recipes, or tap + Find Recipe."/>}

                    <div style={{fontWeight:700,fontSize:16,marginBottom:10,color:t.text}}>{currentRecipe.name}</div>
                    <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                      {[["Cals",currentRecipe.calories,"#fff"],["Protein",`${currentRecipe.protein}g`,t.primary],["Carbs",`${currentRecipe.carbs}g`,"#fbbf24"],["Fat",`${currentRecipe.fat}g`,t.accent]].map(([l,v,c])=>(

                    {currentRecipe.steps?.map((s,i)=><div key={i} style={{fontSize:13,color:"rgba(128,128,128,0.7)",marginBottom:6}}>{i+1}. {s}</div>)}
                  </div>
                  <Btn onClick={()=>{setSavedRecipes(p=>[...p,currentRecipe]);setShowRecipeModal(false);setCurrentRecipe(null);setRecipeQuery("");}}>Save Recipe</Btn>
                </>
              )}
            </Modal>
          )}
        </>
      )}

      {subTab==="runs"&&(
        <div>
          <div style={{background:"rgba(128,128,128,0.05)",borderRadius:16,padding:"20px",marginBottom:16,textAlign:"center",border:"1px solid rgba(128,128,128,0.1)"}}>
            <div style={{fontSize:40,marginBottom:8}}>🏃</div>
            <div style={{fontSize:16,fontWeight:600,marginBottom:4,color:t.text}}>Connect Strava</div>
            <div style={{fontSize:13,color:"rgba(128,128,128,0.5)",marginBottom:16,lineHeight:1.5}}>Link your Strava account to track runs, set goals, and stay accountable.</div>
            <button style={{background:"rgba(252,76,2,0.15)",border:"1px solid rgba(252,76,2,0.4)",color:"#fc4c02",borderRadius:12,padding:"10px 20px",fontSize:14,fontWeight:600,cursor:"pointer"}}>Connect Strava →</button>
          </div>
          <div style={{background:"rgba(128,128,128,0.05)",borderRadius:16,padding:"16px"}}>
            <div style={{fontSize:13,fontWeight:600,color:"rgba(128,128,128,0.5)",marginBottom:12,textTransform:"uppercase",letterSpacing:"0.5px"}}>Quick Log</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {[["Distance","0.0 mi"],["Duration","00:00"],["Pace","0:00/mi"],["Calories","0 kcal"]].map(([l,v])=>(
                <div key={l} style={{background:"rgba(128,128,128,0.06)",borderRadius:12,padding:"12px"}}>
                  <div style={{fontSize:11,color:"rgba(128,128,128,0.5)",marginBottom:4}}>{l}</div>
                  <div style={{fontSize:18,fontWeight:700,color:t.text}}>{v}</div>
                </div>
              ))}
            </div>
            <button style={{width:"100%",marginTop:12,background:t.grad,border:"none",color:"#fff",borderRadius:12,padding:"12px",fontSize:14,fontWeight:600,cursor:"pointer"}}>Log a Run</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── AI Tab ────────────────────────────────────────────────────────────────────
function AITab({chatHistory,setChatHistory,addEvent,addTask,setSavedRecipes,userName}){
  const t=useTheme();
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [listening,setListening]=useState(false);
  const [streamText,setStreamText]=useState("");
  const endRef=useRef(null);

  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:"smooth"}); },[chatHistory,streamText]);

  function startListening(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ alert("Voice not supported. Try Chrome or Safari."); return; }
    const r=new SR(); r.continuous=false; r.interimResults=true; r.lang="en-US";
    r.onstart=()=>setListening(true);
    r.onend=()=>setListening(false);
    r.onresult=(e)=>{
      const tx=Array.from(e.results).map(r=>r[0].transcript).join("");
      setInput(tx);
      if(e.results[0].isFinal){ r.stop(); setTimeout(()=>sendMessage(tx),300); }
    };
    r.onerror=()=>setListening(false);
    r.start();
  }

  async function sendMessage(text){
    const msg=(text||input).trim();
    if(!msg||loading)return;
    setInput(""); setLoading(true); setStreamText("");
    const userMsg={role:"user",content:msg};
    const newHistory=[...chatHistory,userMsg];
    setChatHistory(newHistory);
    try{
      let full="";
      await callClaude(newHistory,tx=>{full=tx;setStreamText(tx);});
      const match=full.match(/\{[\s\S]*?\}/);
      if(match){
        try{
          const action=JSON.parse(match[0]);
          if(action.action==="add_event"){
            const dt=new Date(action.date||new Date());
            if(action.time){ const[h,m]=action.time.split(":").map(Number); dt.setHours(h,m,0,0); }
            addEvent({title:action.title,datetime:dt.toISOString(),category:action.category||"personal",notes:action.notes||""});
            full+="\n\n✅ Added to your calendar!";
          } else if(action.action==="add_task"){
            addTask({title:action.title,due:action.due||"",priority:action.priority||"medium",category:action.category||"personal"});
            full+="\n\n✅ Added to your tasks!";
          } else if(action.action==="recipe"){
            setSavedRecipes(p=>[...p,action]);
            full+="\n\n✅ Recipe saved to Health tab!";
          }
        }catch{}
      }
      setChatHistory(p=>[...p,{role:"assistant",content:full}]);
    }catch{
      setChatHistory(p=>[...p,{role:"assistant",content:"Sorry, I had trouble connecting. Please try again."}]);
    }
    setStreamText(""); setLoading(false);
  }

  const suggestions=["Schedule a workout for tomorrow at 7am","Give me a high-protein dinner recipe","Add a task: call dentist","What should I eat before a run?","Plan my week","Remind me about hydration goals"];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh",paddingTop:60}}>
      <div style={{padding:"0 20px 16px",borderBottom:"1px solid rgba(128,128,128,0.1)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:40,height:40,borderRadius:"50%",background:t.grad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,boxShadow:`0 0 20px ${t.primary}55`}}>✦</div>
          <div>
            <div style={{fontWeight:700,fontSize:16,color:t.text}}>ARIA</div>
            <div style={{fontSize:12,color:"rgba(128,128,128,0.5)"}}>Your AI Life Assistant</div>
          </div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
        {chatHistory.length===0&&(
          <div>
            <div style={{textAlign:"center",padding:"30px 0 20px"}}>
              <div style={{fontSize:40,marginBottom:10}}>✦</div>
              <div style={{fontSize:16,fontWeight:600,marginBottom:6,color:t.text}}>Hi{userName?` ${userName}`:""}! I'm ARIA</div>
              <div style={{fontSize:13,color:"rgba(128,128,128,0.5)",lineHeight:1.6}}>I can add events, create tasks, find recipes, plan your day, and answer anything. Just talk to me!</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {suggestions.map((s,i)=>(
                <button key={i} onClick={()=>sendMessage(s)} style={{background:"rgba(128,128,128,0.06)",border:"1px solid rgba(128,128,128,0.1)",borderRadius:12,padding:"10px",fontSize:12,color:"rgba(128,128,128,0.7)",textAlign:"left",cursor:"pointer",lineHeight:1.4}}>{s}</button>
              ))}
            </div>
          </div>
        )}
        {chatHistory.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:12}}>
            {m.role==="assistant"&&<div style={{width:28,height:28,borderRadius:"50%",background:t.grad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,marginRight:8,flexShrink:0,marginTop:4}}>✦</div>}
            <div style={{maxWidth:"78%",background:m.role==="user"?t.grad:"rgba(128,128,128,0.08)",borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"10px 14px",fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap",color:m.role==="user"?"#fff":t.text}}>{m.content}</div>
          </div>
        ))}
        {(loading||streamText)&&(
          <div style={{display:"flex",justifyContent:"flex-start",marginBottom:12}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:t.grad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,marginRight:8,flexShrink:0,marginTop:4}}>✦</div>
            <div style={{maxWidth:"78%",background:"rgba(128,128,128,0.08)",borderRadius:"18px 18px 18px 4px",padding:"10px 14px",fontSize:14,lineHeight:1.6,color:t.text}}>
              {streamText||<span style={{opacity:0.4}}>Thinking...</span>}
            </div>
          </div>
        )}
        <div ref={endRef}/>
      </div>
      <div style={{padding:"12px 16px 24px",borderTop:"1px solid rgba(128,128,128,0.1)",background:t.bg==="#f1f5f9"?"rgba(241,245,249,0.95)":"rgba(10,10,15,0.95)",backdropFilter:"blur(20px)"}}>
        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
          <button onClick={startListening} style={{width:44,height:44,borderRadius:"50%",background:listening?"rgba(239,68,68,0.25)":"rgba(128,128,128,0.1)",border:`2px solid ${listening?"rgba(239,68,68,0.6)":"rgba(128,128,128,0.2)"}`,color:listening?"#f87171":"rgba(128,128,128,0.6)",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.2s"}}>🎙</button>
          <div style={{flex:1,background:"rgba(128,128,128,0.08)",borderRadius:22,border:"1px solid rgba(128,128,128,0.15)",display:"flex",alignItems:"flex-end",minHeight:44}}>
            <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}} placeholder="Ask ARIA anything..." rows={1} style={{flex:1,background:"none",border:"none",color:t.text,fontSize:14,padding:"11px 14px",resize:"none",outline:"none",fontFamily:"inherit",maxHeight:120,lineHeight:1.5}}/>
          </div>
          <button onClick={()=>sendMessage()} disabled={loading||!input.trim()} style={{width:44,height:44,borderRadius:"50%",background:loading||!input.trim()?"rgba(128,128,128,0.1)":t.grad,border:"none",color:"#fff",fontSize:18,cursor:loading||!input.trim()?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.2s",opacity:loading||!input.trim()?0.4:1}}>↑</button>
        </div>
        {listening&&<div style={{textAlign:"center",fontSize:12,color:"#f87171",marginTop:8,fontWeight:600}}>🎙 Listening...</div>}
      </div>
    </div>
  );
}

// ── App Root ──────────────────────────────────────────────────────────────────
function App(){
  const [themeName,setThemeName]=useLocalStorage("lifeos_theme","indigo");
  const [userName,setUserName]=useLocalStorage("lifeos_name","");
  const theme=THEMES[themeName]||THEMES.indigo;

  const [tab,setTab]=useState("home");
  const [showSettings,setShowSettings]=useState(false);
  const [events,setEvents]=useLocalStorage("lifeos_events",[]);
  const [tasks,setTasks]=useLocalStorage("lifeos_tasks",[]);
  const [habits,setHabits]=useLocalStorage("lifeos_habits",[
    {id:1,name:"Morning run",icon:"🏃",streak:0,completedDates:[]},
    {id:2,name:"Drink 2L water",icon:"💧",streak:0,completedDates:[]},
    {id:3,name:"Meditate",icon:"🧘",streak:0,completedDates:[]},
    {id:4,name:"Read 20 min",icon:"📚",streak:0,completedDates:[]},
  ]);
  const [chatHistory,setChatHistory]=useLocalStorage("lifeos_chat",[]);
  const [savedRecipes,setSavedRecipes]=useLocalStorage("lifeos_recipes",[]);
  const [selectedDay,setSelectedDay]=useState(new Date());
  const [showAddEvent,setShowAddEvent]=useState(false);

  const notifSupported=typeof window!=="undefined"&&"Notification" in window;
  const [notifPerm,setNotifPerm]=useState(()=>notifSupported?window.Notification.permission:"denied");
  useEffect(()=>{ if(!notifSupported)return; if(window.Notification.permission==="default") window.Notification.requestPermission().then(p=>setNotifPerm(p)); },[]);
  useEffect(()=>{
    const iv=setInterval(()=>{
      if(!notifSupported||notifPerm!=="granted")return;
      const now=new Date();
      events.forEach(ev=>{
        if(ev.reminded)return;
        const evTime=new Date(ev.datetime),diff=(evTime-now)/60000;
        if(diff>0&&diff<=15){ try{new window.Notification(`⏰ ${ev.title}`,{body:`In ${Math.round(diff)} minutes`});}catch{} setEvents(prev=>prev.map(e=>e.id===ev.id?{...e,reminded:true}:e)); }
      });
    },60000);
    return()=>clearInterval(iv);
  },[events,notifPerm]);

  const addEvent=ev=>setEvents(prev=>[...prev,{...ev,id:Date.now(),reminded:false}]);
  const addTask=task=>setTasks(prev=>[...prev,{...task,id:Date.now(),done:false}]);
  const toggleTask=id=>setTasks(prev=>prev.map(t=>t.id===id?{...t,done:!t.done}:t));
  const toggleHabit=id=>{
    const todayStr=new Date().toDateString();
    setHabits(prev=>prev.map(h=>{
      if(h.id!==id)return h;
      const done=h.completedDates.includes(todayStr);
      const dates=done?h.completedDates.filter(d=>d!==todayStr):[...h.completedDates,todayStr];
      let streak=0; const d=new Date();
      while(dates.includes(d.toDateString())){streak++;d.setDate(d.getDate()-1);}
      return{...h,completedDates:dates,streak};
    }));
  };

  return(
    <ThemeCtx.Provider value={theme}>
      <div style={{fontFamily:"'SF Pro Display',-apple-system,BlinkMacSystemFont,sans-serif",background:theme.bg,minHeight:"100vh",color:theme.text,maxWidth:430,margin:"0 auto",position:"relative",overflow:"hidden"}}>
        <div style={{position:"relative",zIndex:1,paddingBottom:90}}>
          {tab==="home"&&<HomeTab events={events} tasks={tasks} habits={habits} toggleHabit={toggleHabit} toggleTask={toggleTask} setTab={setTab} setSelectedDay={setSelectedDay} userName={userName}/>}
          {tab==="calendar"&&<CalendarTab events={events} selectedDay={selectedDay} setSelectedDay={setSelectedDay} addEvent={addEvent} showAdd={showAddEvent} setShowAdd={setShowAddEvent}/>}
          {tab==="tasks"&&<TasksTab tasks={tasks} addTask={addTask} toggleTask={toggleTask}/>}
          {tab==="health"&&<HealthTab habits={habits} toggleHabit={toggleHabit} savedRecipes={savedRecipes} setSavedRecipes={setSavedRecipes}/>}
          {tab==="ai"&&<AITab chatHistory={chatHistory} setChatHistory={setChatHistory} addEvent={addEvent} addTask={addTask} setSavedRecipes={setSavedRecipes} userName={userName}/>}
        </div>
        <BottomNav tab={tab} setTab={setTab} onSettings={()=>setShowSettings(true)}/>
        {showSettings&&<SettingsPanel themeName={themeName} setThemeName={setThemeName} userName={userName} setUserName={setUserName} onClose={()=>setShowSettings(false)}/>}
      </div>
    </ThemeCtx.Provider>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);

    setTimeout(() => {
      const el = document.getElementById('loading');
      if(el) { el.style.opacity='0'; setTimeout(()=>el.remove(), 500); }
    }, 1800);
</script>
</body>
</html>
